name: deploy feature branch
on:
  workflow_dispatch:

concurrency:
  group: deploy_feature_branch
  cancel-in-progress: true

permissions:
  packages: write
  contents: write

jobs:
  test-build-and-push:
    permissions:
      packages: write
      contents: write
      id-token: write
      actions: read
    name: Test, build and push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
      telemetry: ${{ steps.docker-build-push.outputs.telemetry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: Build artifacts
        run: ./gradlew build --no-daemon
      - name: Push docker image to GAR
        uses: nais/docker-build-push@45d352fb62fb52ccb5ff6cba22c047fa02b35321
        id: docker-build-push
        with:
          team: pto
          tag: latest

  deploy-dev:
    name: Deploy application to GCP dev
    needs: test-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Deploy application
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais-dev.yaml
          VAR: image=${{ needs.test-build-and-push.outputs.image }}
          TELEMETRY: ${{ needs.test-build-and-push.outputs.telemetry }}
